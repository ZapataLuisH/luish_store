<section class="w-full flex justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="w-full sm:w-4/5 md:w-2/3 lg:w-1/2 xl:w-2/5">

    <h1 class="text-3xl font-bold mb-8 text-center">
      Contáctenos
    </h1>
    <div *ngIf="success"
        class="mb-6 p-4 rounded-lg bg-green-100 text-green-700 border border-green-300 text-center">
      ✅ Tu mensaje fue enviado correctamente.
    </div>
    <form
      name="contact"
      method="POST"
      data-netlify="true"
      action="/contact?success=true"
      class="flex flex-col gap-5 bg-white p-6 sm:p-8 rounded-xl shadow-md"
    >
      <input type="hidden" name="form-name" value="contact" />

      <input
        type="text"
        name="name"
        placeholder="Nombre"
        required
        class="border p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-red-400"
      />

      <input
        type="email"
        name="email"
        placeholder="Correo electrónico"
        required
        class="border p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-red-400"
      />

      <textarea
        name="message"
        placeholder="Escribe tu mensaje"
        required
        class="border p-3 rounded-lg h-32 w-full resize-none focus:outline-none focus:ring-2 focus:ring-red-400"
      ></textarea>

      <button
        type="submit"
        class="bg-red-500 text-white py-3 rounded-lg hover:bg-red-600 transition font-medium"
      >
        Enviar mensaje
      </button>
    </form>

  </div>
</section>

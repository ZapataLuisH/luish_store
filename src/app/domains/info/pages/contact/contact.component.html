<div class="max-w-7xl mx-auto px-4 py-12">

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">

    <!-- IZQUIERDA (INFO) -->
    <div class="space-y-6">

      <h1 class="text-3xl sm:text-4xl font-bold">
        Hablemos 👋
      </h1>

      <p class="text-gray-600 text-sm sm:text-base">
        ¿Tienes dudas sobre algún producto? ¿Necesitas asesoría?
        Estamos aquí para ayudarte a encontrar la mejor solución.
      </p>

      <div class="space-y-3 text-sm text-gray-600">

        <div>✔ Respuesta rápida</div>
        <div>✔ Asesoría personalizada</div>
        <div>✔ Atención directa</div>

      </div>

    </div>


    <!-- DERECHA (FORMULARIO) -->
    <div>

      <form
        name="contact"
        data-netlify="true"
        (submit)="submitForm($event)"
        class="flex flex-col gap-5 bg-white p-6 sm:p-8 rounded-2xl shadow-lg border"
      >

        <input type="hidden" name="form-name" value="contact" />

        <div class="flex flex-col gap-1">
          <label class="text-sm text-gray-600">¿Cómo te llamas?</label>
          <input
            type="text"
            name="name"
            required
            class="border p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-red-400 transition"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-sm text-gray-600">Tu correo</label>
          <input
            type="email"
            name="email"
            required
            class="border p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-red-400 transition"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-sm text-gray-600">¿En qué podemos ayudarte?</label>
          <textarea
            name="message"
            required
            class="border p-3 rounded-lg h-32 w-full resize-none focus:outline-none focus:ring-2 focus:ring-red-400 transition"
          ></textarea>
        </div>

        <button
          type="submit"
          class="bg-red-500 text-white py-3 rounded-lg hover:bg-red-600 transition font-medium"
        >
          Enviar mensaje
        </button>

        <!-- MENSAJE DE ÉXITO -->
        <p
          *ngIf="successMessage"
          class="text-green-600 text-center font-medium mt-2"
        >
          ✔ Mensaje enviado correctamente
        </p>

      </form>

    </div>

  </div>

</div>

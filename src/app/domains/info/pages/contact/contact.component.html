<div class="w-full flex justify-center px-4 py-10">

  <div class="w-full md:w-[70%] lg:w-[50%] max-w-[600px]">

    <form
      name="contact"
      data-netlify="true"
      (submit)="submitForm($event)"
      class="flex flex-col gap-5 bg-white p-6 sm:p-8 rounded-xl shadow-md"
    >

      <input type="hidden" name="form-name" value="contact" />

      <input
        type="text"
        name="name"
        placeholder="Nombre"
        required
        class="border p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-red-400"
      />

      <input
        type="email"
        name="email"
        placeholder="Correo electrónico"
        required
        class="border p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-red-400"
      />

      <textarea
        name="message"
        placeholder="Escribe tu mensaje"
        required
        class="border p-3 rounded-lg h-32 w-full resize-none focus:outline-none focus:ring-2 focus:ring-red-400"
      ></textarea>

      <button
        type="submit"
        class="bg-red-500 text-white py-3 rounded-lg hover:bg-red-600 transition font-medium"
      >
        Enviar mensaje
      </button>

    </form>

  </div>

</div>
